<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onmouseover="showMessage()">Move Mouse</button>
    <p id="msg"></p>

    <script>
        let isText = false;
        function showMessage() {
            document.getElementById("msg").innerHTML = "Mouse is over the button!";
        }
    </script>       
</body>
</html>
