<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Double Click</title>
</head>
<body>
    <h2 ondblclick="showalert()">Double Click this Text</h2>
    <script>
        function showalert(){
            alert("Mouse Button Double Clicked!!!")
        }
    </script>
</body>
</html>
