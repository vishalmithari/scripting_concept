<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Grade Card using if, elif ladder</h1>
    <script>
        const percent = parseInt(prompt("Enter Your Percentage: "));
        if (percent >= 90){
            document.write("Grade: O");
        } else if (percent >= 80) {
            document.write("Grade: A+");
        } else if (percent >= 70) {
            document.write("Grade: A");
        } else if (percent >= 60){
            document.write("Grade: B+")
        } else if (percent >= 50){
            document.write("Grade: B")
        } else if (percent >= 40){
            document.write("Grade: C")
        } else {
            document.write("Grade: Fail")
        }
    </script>
</body>
</html>
