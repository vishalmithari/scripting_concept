<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Grade Card using if</h1>
    <script>
        const percent = parseInt(prompt("Enter Your Percentage: "));
        if (percent >= 40){
            document.write("Grade: Pass");
        } else {
            document.write("Grade: Fail");
        }
    </script>
</body>
</html>
