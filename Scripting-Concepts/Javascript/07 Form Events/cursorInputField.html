<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor leaves Input filed</title>
</head>
<body>
    <h3 id="msg">Move cursor into the box</h3>
    <input type="text" onmouseenter="enter()" onmouseleave="leave()">

    <script>
        function enter() {
            msg.innerHTML = "Cursor entered the input field";
        }
        function leave() {
            msg.innerHTML = "Cursor left the input field";
        }
    </script>
</body>
</html>
