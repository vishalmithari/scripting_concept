<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Show Alert When User Changes Option</h2>
    
    <h3>Select Department</h3>
    <select onchange="showalert()">
        <option>CSE</option>
        <option>AIML</option>
        <option>DS</option>
    </select>

    <script>
        function showalert(){
            alert("Department Changed!!!")
        }
    </script>
</body>
</html>
