<!DOCTYPE HTML>
<html>
	<head>
		<title>Variables and Data Types</title>
	</head>
	<body>
	
		<h1>Variables and Data Types</h1>
		<script>
			let name = "Shubham";
			console.log("Shubham");
			
			name = "Pattewar";
			console.log(name);
			
			var college = "DYP";
			college = "DYPCET";
			console.log(college);
			
			const pi = 3.14;
			console.log(pi);
			// pi = 3.1478;			//Error
			// console.log(3.14);

			let a="shubham", b = "abhi", c= 32;
			console.log(a,b,c);		//an extra space is added automatically
			
			
			// Data Types
			// Primitive: Numbers, strings, boolean, null, undefined, symbol
			
			let word = 'JavaScript'
			word[3] = 'Y'			//nothing will change
			console.log(word);
			
			let age = 35
			const gravity = 9.81
			console.log(age, gravity);
			
			let fn = "shub";
			let ln = "pat";
			console.log(fn+ln);		//no extra space
			console.log(fn,ln);		//extra space bydefault
			
			let isSleep = true;
			console.log(isSleep);
			
			let FanOn = false;
			console.log(FanOn);
			
			//undefined
			let z
			console.log(z)		//undefined
			
			//null
			let y = null;
			console.log(y);
		</script>
	</body>
</html/>
