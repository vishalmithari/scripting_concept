<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Check Weather Username is Empty or Not</h2>
    <script>
        let username = prompt("Enter Username: ");
        try{
            if (username === "") {
                throw "Empty Username";
            }
            document.write("Username is: " + username);
        } catch(error){
            document.write("Error Found: " + error);
        } finally{
            document.write("<br>Program Executed Successfully");
        }
    </script>
</body>
</html>
