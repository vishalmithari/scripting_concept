<!DOCTYPE html>
<html>
<head>
    <title>Age Validation</title>
</head>
<body>

<h2>Age Check</h2>

Enter Age:
<input type="text" id="age">
<button onclick="checkAge()">Check</button>

<p id="result"></p>

<script>
function checkAge() {

    let age = document.getElementById("age").value;
    let result = document.getElementById("result");

    if (age === "") {
        result.innerHTML = "Please enter your age";
    }
    else if (isNaN(age)) {
        result.innerHTML = "Age must be a number";
    }
    else if (age >= 18) {
        result.innerHTML = "You are eligible (Age is greater than 18)";
    }
    else {
        result.innerHTML = "You are not eligible (Age is less than 18)";
    }
}
</script>

</body>
</html>
